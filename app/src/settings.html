<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Xolariq — Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Xolariq</h1>
        <p>Right-click any file in Explorer to convert it. The settings below apply to every conversion.</p>
      </header>

      <section class="card row spread align-center">
        <div class="card-text">
          <label for="ctx-toggle">Enable Windows context menu</label>
          <p class="muted" id="ctx-status">Checking integration status…</p>
        </div>
        <button id="ctx-toggle" class="primary">…</button>
      </section>

      <section class="card">
        <div class="row spread">
          <label for="output-folder">Output folder</label>
          <button id="pick-folder">Browse…</button>
        </div>
        <p class="muted truncate" id="output-folder-display">Same folder as input</p>
      </section>

      <section class="card">
        <div class="row spread">
          <label for="output-mode">When the output already exists</label>
          <select id="output-mode">
            <option value="rename">Rename new file</option>
            <option value="overwrite">Overwrite existing</option>
          </select>
        </div>
        <label class="row">
          <input type="checkbox" id="preserve-metadata" />
          Preserve metadata (tags, EXIF) when supported
        </label>
      </section>

      <footer>
        <button
          id="github-btn"
          class="icon-btn"
          type="button"
          title="View Xolariq on GitHub"
          aria-label="View Xolariq on GitHub"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            viewBox="0 0 16 16"
            aria-hidden="true"
          >
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
            />
          </svg>
          <span>GitHub</span>
        </button>
        <div class="footer-spacer"></div>
        <button id="reset-btn" class="danger">Reset</button>
        <button id="save-btn" class="primary">Save</button>
      </footer>
    </main>

    <script src="settings.js" type="module"></script>
  </body>
</html>
